<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 170px;
      padding: 15px;
      text-align: center;
      font-family: sans-serif;
    }
    button {
      width: 100%;
      padding: 10px 15px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 10px;
    }
    button:hover {
      background-color: #3367d6;
    }
    button:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <button id="captureBtn">截取整个网页</button>
  <button id="cdpCaptureBtn">CDP整页（知识库最完整）</button>
  <button id="customCaptureBtn">自定义（选起止位置）</button>
  <script src="popup.js"></script>
</body>
</html>
